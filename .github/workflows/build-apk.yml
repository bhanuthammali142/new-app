name: Build Android APKs

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build & Package Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Compile Frontend Application
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle Packages
        uses: gradle/actions/setup-gradle@v3

      - name: Sync Web Assets to Capacitor Android Project
        run: npx cap sync android

      - name: Configure Signing Credentials
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "🔐 Using production release keystore from GitHub Secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "KEYSTORE_FILE=release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "⚠️ No custom keystore secrets found. Generating a temporary self-signed keystore..."
            keytool -genkey -v \
              -keystore android/app/release.keystore \
              -alias hostelkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=HostelOS, OU=Development, O=HostelOS, L=HostelOS, S=HostelOS, C=US" \
              -storepass tempstorepass \
              -keypass tempkeypass
            echo "KEYSTORE_FILE=release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=tempstorepass" >> $GITHUB_ENV
            echo "KEY_ALIAS=hostelkey" >> $GITHUB_ENV
            echo "KEY_PASSWORD=tempkeypass" >> $GITHUB_ENV
          fi

      - name: Build APKs (Debug and Release)
        run: |
          cd android
          chmod +x gradlew
          # Compile Debug APK
          ./gradlew assembleDebug
          # Compile signed Release APK (using env vars from previous step)
          ./gradlew assembleRelease

      - name: Locate and Rename APK Outputs
        run: |
          mkdir -p build-artifacts
          # Copy Debug APK
          cp android/app/build/outputs/apk/debug/app-debug.apk build-artifacts/HostelOS-debug.apk
          
          # Copy Release APK (if signed, gradle generates app-release.apk, otherwise app-release-unsigned.apk)
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk build-artifacts/HostelOS-release.apk
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk build-artifacts/HostelOS-release-unsigned.apk
          fi
          
          echo "📂 Artifacts folder content:"
          ls -la build-artifacts/

      - name: Upload APKs as Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HostelOS-Android-APKs
          path: build-artifacts/
          if-no-files-found: error
          retention-days: 7
