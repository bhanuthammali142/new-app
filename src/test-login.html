<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input { margin: 10px 0; padding: 8px; width: 200px; }
        button { padding: 10px 20px; margin: 10px; }
        pre { background: #f0f0f0; padding: 10px; margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>HostelOS Backend Test</h1>
    
    <h2>Test 1: Health Check</h2>
    <button onclick="testHealth()">Test Health Endpoint</button>
    
    <h2>Test 2: Login</h2>
    <input type="email" id="email" placeholder="Email" value="admin@example.com"><br>
    <input type="password" id="password" placeholder="Password" value="admin123"><br>
    <button onclick="testLogin()">Test Login</button>
    
    <h2>Response:</h2>
    <pre id="result">Click a button to test...</pre>

    <script>
        const API_URL = 'https://hostelos-yis2.onrender.com';
        
        async function testHealth() {
            const result = document.getElementById('result');
            result.textContent = 'Testing health endpoint...';
            
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                result.textContent = '✅ SUCCESS!\n\n';
                result.textContent += 'Status: ' + response.status + '\n';
                result.textContent += 'Response: ' + JSON.stringify(data, null, 2);
                result.className = 'success';
            } catch (error) {
                result.textContent = '❌ ERROR!\n\n';
                result.textContent += 'Message: ' + error.message + '\n\n';
                result.textContent += 'Make sure backend is running on port 5001';
                result.className = 'error';
            }
        }
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            
            result.textContent = 'Testing login...';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.textContent = '✅ LOGIN SUCCESSFUL!\n\n';
                    result.textContent += 'Status: ' + response.status + '\n';
                    result.textContent += 'Token: ' + (data.token ? data.token.substring(0, 50) + '...' : 'No token') + '\n\n';
                    result.textContent += 'User: ' + JSON.stringify(data.user, null, 2);
                    result.className = 'success';
                    
                    // Store token
                    localStorage.setItem('test_token', data.token);
                    console.log('Token stored:', data.token);
                } else {
                    result.textContent = '❌ LOGIN FAILED!\n\n';
                    result.textContent += 'Status: ' + response.status + '\n';
                    result.textContent += 'Error: ' + (data.error || JSON.stringify(data)) + '\n\n';
                    result.textContent += 'Troubleshooting:\n';
                    result.textContent += '1. Check if users exist in database\n';
                    result.textContent += '2. Run: INSERT INTO users (name, email, password, role) VALUES ("Admin", "admin@example.com", "admin123", "super_admin")';
                    result.className = 'error';
                }
            } catch (error) {
                result.textContent = '❌ NETWORK ERROR!\n\n';
                result.textContent += 'Message: ' + error.message + '\n\n';
                result.textContent += 'Make sure:\n';
                result.textContent += '1. Backend is running: cd backend && node server.js\n';
                result.textContent += '2. Backend is on port 5001\n';
                result.textContent += '3. No firewall blocking port 5001';
                result.className = 'error';
            }
        }
    </script>
</body>
</html>
